version: '3.8'

services:
  app:
    image: python:3.13-slim
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      # Resolve custom n8n domain inside the container via Docker host gateway.
      - "n8n.localhost:host-gateway"
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python main.py"
